<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#070913">
  <title>Страница не найдена — 3BEK Labs</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;background:#070913}
    *{box-sizing:border-box}
    body{min-height:100vh;margin:0;background:radial-gradient(circle at 80% 20%,#18234b 0,transparent 36%),#070913}
    .container{width:min(1180px,calc(100% - 40px));margin:auto}
    header{border-bottom:1px solid rgba(255,255,255,.12);background:rgba(7,9,19,.82)}
    header .container{display:flex;height:76px;align-items:center}
    .logo{display:flex;align-items:center;gap:12px;color:#fff;font-size:24px;font-weight:900;letter-spacing:-.06em;text-decoration:none;text-transform:uppercase}
    .mark{position:relative;width:38px;height:38px;border:1px solid #685cff;border-radius:10px;background:linear-gradient(135deg,#5144bd,#15284d)}
    .mark::before{position:absolute;inset:9px;border:2px solid #fff;border-radius:3px;content:"";transform:rotate(45deg)}
    main{display:grid;min-height:calc(100vh - 77px);place-items:center;padding:64px 0}
    .eyebrow{color:#9d8cff;font-size:12px;font-weight:900;letter-spacing:.22em;text-transform:uppercase}
    h1{max-width:10ch;margin:18px 0;font-size:clamp(48px,9vw,104px);letter-spacing:-.07em;line-height:.9}
    p{max-width:580px;margin:0 0 30px;color:#aab3c8;font-size:19px;line-height:1.6}
    .btn{display:inline-flex;padding:14px 22px;border-radius:8px;background:linear-gradient(135deg,#3f8cff,#7d4cff);color:#fff;font-weight:800;text-decoration:none}
  </style>
</head>
<body>
  <header>
    <div class="container"><a class="logo" href="/"><span class="mark"></span><span>3BEK Labs</span></a></div>
  </header>
  <main>
    <div class="container">
      <div class="eyebrow">Ошибка 404</div>
      <h1>Страница не найдена</h1>
      <p>Возможно, ссылка устарела или адрес был введён неправильно.</p>
      <a class="btn" href="/">Вернуться на главную →</a>
    </div>
  </main>
</body>
</html>
